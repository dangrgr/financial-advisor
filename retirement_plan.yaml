  cash_reserve: "~$120k + incoming $50k gift from Terri's parents"
  inheritance: "parents 75-80; would pay off mortgage / add to portfolio (timing unknown)"
  mortgage_payoff: "P&I ~$1,688/mo drops off ~2049 (or earlier via inheritance)"
  delayed_ss: "claiming at 70 = Dan $5,266/mo vs $4,223 at 67"
  part_time_income: "any earned income shortens the pre-67 bridge"

# ============================================================
# REVIEW WATCHLIST — open questions to revisit each Jan 1 (most material first).
# NOT blockers; the plan is conservatively framed. Flip `status` as resolved.
# ============================================================
review_watchlist:
  - id: conversion_taxes
    priority: 1
    issue: "Roth-conversion taxes likely understated. 'Fill the 22% bracket' double-counts once post-59.5 pre-tax SPENDING also fills the low brackets; real blended rate ~18-22% (fed + 3.8% NIIT in big years + CO 4.4%), not 12-17%."
    why: "Thins the cushion; argues for leaning to the $12-13k/mo end."
    action: "At the first retired review, build a representative conversion-year tax worksheet (fed + NIIT + CO); size conversions NET of other taxable income."
    status: open
    note_2026_06: "QUANTIFIED via --conversions ($190k/yr @ 19%): honest base-case
      ending is ~$3.43M vs the naive $4.02M. Strategy confirmed value-positive
      (+$0.2-0.7M vs realistic no-conversion worlds at 18-22% withdrawal rates),
      and the $12k stress floor still survives with drag included (+$549k).
      Bracket-accurate worksheet at first retired review still worthwhile."
  - id: rmd_drain
    priority: 2
    issue: "Pre-tax pile (~$946k now -> ~$1.4M by 2034) may not fully drain via 22%-only conversions before RMDs at 75 (Terri ~2052 / Dan ~2054)."
    why: "Surviving pre-tax balance forces large RMDs + widow's-penalty taxes."
    action: "Project pre-tax balance at age 75 after planned conversions + growth; if > ~$1M, deliberately convert into the 24% bracket some years."
    status: open
    note_2026_06: "Modeled: with --conversions the pre-tax pile is fully drained
      by Dan 67 on the base path — RMD problem eliminated IF the conversion
      schedule is executed. Stays open only as an execution check."
  - id: health_aca
    priority: 3
    issue: "$15k/person health bridge is a placeholder; unsubsidized CO silver for 55+ may run $18-24k/person by 2034. Large conversions also forfeit ACA subsidies."
    why: "Understated health cost directly raises the pre-65 spend need."
    action: "Near the date, price actual CO marketplace 55-yo silver plans + inflate; treat as a hard line."
    status: open
  - id: terri_ss_survivor
    priority: 4
    issue: "Terri's $2,815/mo is a 2/3-of-Dan ESTIMATE (unconfirmed). Survivor case not modeled: at first death the household keeps only the larger benefit and shifts to single brackets."
    why: "Affects the income floor and the widow's-penalty tax math."
    action: "Pull Terri's real ssa.gov estimate; sanity-check a survivor-income scenario (Dan's benefit alone, single brackets)."
    status: open
  - id: taxable_basis
    priority: 5
    issue: "Bridge cap-gains modeled at 7.5% effective, assuming ~50% basis in account 7157."
    why: "If embedded gains are higher, the bridge drawdown costs more tax."
    action: "Pull actual cost basis from Vanguard for 7157; harvest gains in low-conversion years."
    status: open
  - id: college_timing
    priority: 6
    issue: "Older kid's freshman year (~2030) is PRE-retirement; tuition overlaps the high-earning + conversion years. 529s ($115k + $500/mo) should cover but unverified."
    why: "A 529 shortfall would raid the taxable bridge fund."
    action: "Project each 529 balance vs. 4-year cost-of-attendance at matriculation; top up now if short."
    status: open
  - id: sequence_risk_glidepath
    priority: 2
    issue: "NEW (Jun 2026 Monte Carlo): with static $13k/mo spending and
      all-equity volatility (16%), success is ~61%; at 60/40-like vol (10%)
      it's ~71%; a 10% spend cut adds ~9 points. Failures cluster around
      Dan age ~72 (first ~15 retirement years). The plan has no glidepath."
    why: "Volatility near the retirement date is now quantified as a lever
      roughly as powerful as $1k/mo of spend — and currently unmanaged
      (portfolio is heavily VGT/tech-tilted equity)."
    action: "Design a bond-tent/glidepath (e.g., de-risk toward ~60/40 over
      2031-2036) and a spending guardrail rule (cut to $12k when below the
      target trajectory) at the next annual review. Run
      `python3 retirement_projection.py --monte-carlo 2000 --vol 0.10` to see
      the target state."
    status: open

